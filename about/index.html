<div class="about-page">
    <h1>关于</h1>
    <p>这是一个简洁的个人博客，使用 Python + Flask 构建。</p>
    <p>你可以将 Markdown 文件放在 <code>posts/</code> 目录下，博客会自动读取并渲染。</p>
    <p>支持 YAML frontmatter 来设置标题、日期和标签：</p>
    <pre><code>---
title: 文章标题
date: 2024-01-01
tags: python, flask
---

这里是正文内容，支持 Markdown 语法。
</code></pre>
